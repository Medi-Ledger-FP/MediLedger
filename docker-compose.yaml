version: '3.7'

networks:
  mediledger:
    name: mediledger-network

volumes:
  orderer.mediledger.com:
  peer0.healthcare.mediledger.com:
  ca.healthcare.mediledger.com:


services:
  # Certificate Authority
  ca.healthcare.mediledger.com:
    image: hyperledger/fabric-ca:1.5.6
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.healthcare.mediledger.com
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ca.healthcare.mediledger.com:/etc/hyperledger/fabric-ca-server
    container_name: ca.healthcare.mediledger.com
    networks:
      - mediledger

  # Orderer
  orderer.mediledger.com:
    image: hyperledger/fabric-orderer:2.5.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=false
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_METRICS_PROVIDER=prometheus
    working_dir: /root
    command: orderer
    volumes:
      - orderer.mediledger.com:/var/hyperledger/production/orderer
      - ./fabric-network/crypto-config/ordererOrganizations/mediledger.com/orderers/orderer.mediledger.com/msp:/var/hyperledger/orderer/msp
      - ./fabric-network/crypto-config/ordererOrganizations/mediledger.com/orderers/orderer.mediledger.com/tls:/var/hyperledger/orderer/tls
      - ./fabric-network/channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
    ports:
      - "7050:7050"
      - "7053:7053"
      - "9443:9443"
    container_name: orderer.mediledger.com
    networks:
      - mediledger

  # Peer
  peer0.healthcare.mediledger.com:
    image: hyperledger/fabric-peer:2.5.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_ID=peer0.healthcare.mediledger.com
      - CORE_PEER_ADDRESS=peer0.healthcare.mediledger.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.healthcare.mediledger.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.healthcare.mediledger.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.healthcare.mediledger.com:7051
      - CORE_PEER_LOCALMSPID=HealthcareOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.healthcare.mediledger.com:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0healthcare"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - peer0.healthcare.mediledger.com:/var/hyperledger/production
      - ./fabric-network/crypto-config/peerOrganizations/healthcare.mediledger.com/peers/peer0.healthcare.mediledger.com/msp:/etc/hyperledger/fabric/msp
      - ./fabric-network/crypto-config/peerOrganizations/healthcare.mediledger.com/peers/peer0.healthcare.mediledger.com/tls:/etc/hyperledger/fabric/tls
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
      - "9444:9444"
    container_name: peer0.healthcare.mediledger.com
    depends_on:
      - couchdb
    networks:
      - mediledger
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # CouchDB for Peer
  couchdb:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    container_name: couchdb
    networks:
      - mediledger
