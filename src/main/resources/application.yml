server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: mediledger

# Hyperledger Fabric Configuration
fabric:
  network:
    name: mediledger-network
    channel: healthcarechannel
    chaincode: mediledger-cc
    connection-profile: fabric-network/connection-profile.yaml
  ca:
    url: http://localhost:7054
    name: ca.healthcare.mediledger.com
    admin:
      username: admin
      password: adminpw
    tls-enabled: false
  organization:
    name: HealthcareOrg
    msp-id: HealthcareOrgMSP
    peer:
      url: grpc://localhost:7051
      name: peer0.healthcare.mediledger.com
  wallet:
    type: file
    path: wallet/admin_final

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mediledger-secret-key-change-this-in-production-2024}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# IPFS / Pinata Configuration
ipfs:
  pinata:
    api:
      key: c1347cf3e6597d0844e4
    secret:
      key: 2284103d9efada57de946dd90f089078e9766ebf8d767df6e973841dad922d40
    jwt: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..lWdJwMuE2OMCwYbpuWIfIUVcwI3tyjKKY6T5zYWfFhQ

# Logging Configuration
logging:
  level:
    root: INFO
    com.mediledger: DEBUG
    org.hyperledger.fabric: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mediledger.log
